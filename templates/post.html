<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
    <style>
        .post {
            padding: 10px;
        }
        .title{
            font-size: x-large;
        }
        .content{
            padding: 5px;
            margin: 5px;
            background-color: lightgray;
        }
        .time{
            color: gray;
        }
        .comm {
            padding: 10px;
        }
        .author {
            font-weight: bold;
        }
        .ts{
            color: gray;
            font-size: 80%;
        }
        .message{
            padding: 10px;
        }
        textarea{
            display: block;
            width: 300px;
            margin: 5px;
        }
        input, button{
            margin: 5px;
        }
        input {
            width: 200px;
        }
        button{
            width: 85px;
        }
    </style>
</head>
<body>
    <div class="post">
        <span class="title">{{ post.title }}</span> 
        <div class="inside">
            <div class="content">{{ post.content }}</div>
            <span class="time">{{ post.time.strftime("%d. %B %H:%M") }}</span>
        </div>
    </div>
    <form method="post" action="/newComment">
        <textarea name="message" rows="5"></textarea>
        <input type="text" name="author" placeholder="Your name">
        <input type="hidden" name="post_id" value="{{ post.id }}">
        <button type="submit">Send</button>
    </form>
    <div class="comments">
    {% for c in comments %}
        <div class="comm">
            <div class="info">
                <span class="author">{{ c.author }}</span> 
                <span class="ts">{{ c.time.strftime("%d. %B %H:%M") }}</span>
            </div>
            <div class="message">
                {{ c.content }}
            </div>
        </div>
    {% endfor %}
    </div>
</body>
</html>
